services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - STORAGE_ENDPOINT=http://garage:3900
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_BUCKET_PROFILE_PICTURES=${STORAGE_BUCKET_PROFILE_PICTURES}
      - SECRET_KEY=${SECRET_KEY}
      - CLASSIFICATION_SERVICE_URL=${CLASSIFICATION_SERVICE_URL}
    depends_on:
      - postgres
      - garage
      - classification-service

  classification-service:
    build: ./classification-service
    ports:
      - "8001:8001"

  postgres:
    image: postgres:18.3
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "1234:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.3.0
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    ports:
      - "3900:3900" # S3 API
      - "3902:3902" # Admin API
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
  seeder:
    build: .
    command: python sample-generator.py
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      # This service is only for seeding the database with sample data. It will run the `seed()` function in `sample-generator.py
      # which creates an admin user and 10 regular users with fake data.
      - seed

volumes:
  postgres_data:
  garage_meta:
  garage_data:
