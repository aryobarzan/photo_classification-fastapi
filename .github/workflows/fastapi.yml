name: CICD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Verify that the FastAPI server's dependencies can be installed.
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

  # Verify that the docker image builds and the container with the FastAPI server starts correctly
  docker:
    runs-on: ubuntu-latest
    env:
      DB_NAME: testdb
      DB_USER: testuser
      DB_PASSWORD: testpassword
      SECRET_KEY: testsecretkey
      STORAGE_ACCESS_KEY: testkey
      STORAGE_SECRET_KEY: testsecret
      STORAGE_BUCKET_PROFILE_PICTURES: profile-pictures
      GARAGE_RPC_SECRET: testgaragersecret

    steps:
      - uses: actions/checkout@v6
      # -d runs all services defined in docker-compose.yaml in detached mode, i.e., in the background.
      - name: Run services
        run: |
          docker compose up -d
      # '-sf' options make curl fail silently (-s) on server errors and only output the response body if the request is successful (-f).
      - name: Check if FastAPI app is running
        run: |
          for i in {1..15}; do
            curl -sf http://localhost:8000/health && exit 0
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 15 attempts"
          docker compose logs backend
          exit 1
      - name: Stop services
        run: |
          docker compose down
